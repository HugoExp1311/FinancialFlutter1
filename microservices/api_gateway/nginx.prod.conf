worker_processes auto;
worker_rlimit_nofile 65535;

events { 
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Hide Nginx version
    server_tokens off;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Rate Limiting Zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=30r/s;

    # Upstream Definitions
    upstream transaction_backend {
        server transaction_service:8080 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream chatbot_backend {
        server chatbot_service:3002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    server {
        listen 80;
        server_name api-flutter.vault.io.vn;

        # Security Headers (Cloudflare will add HTTPS headers)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # CORS Configuration - Allow Flutter app domain
        set $cors_origin "";
        if ($http_origin ~* (https://flutter\.vault\.io\.vn|http://localhost:.*)) {
            set $cors_origin $http_origin;
        }

        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, Accept, Origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age' '86400' always;

        # Handle OPTIONS preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Health Check Endpoint (for monitoring)
        location /health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"healthy","service":"api_gateway","timestamp":"$time_iso8601","version":"1.0.0"}';
        }

        # Transaction Service Routes
        location /transactions {
            limit_req zone=api_limit burst=20 nodelay;
            
            proxy_pass http://transaction_backend;
            proxy_http_version 1.1;
            
            # Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Connection reuse
            proxy_set_header Connection "";
        }

        # Chatbot AI Service Routes
        location /chat {
            limit_req zone=chat_limit burst=10 nodelay;
            
            proxy_pass http://chatbot_backend;
            proxy_http_version 1.1;
            
            # Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            
            # Timeouts (longer for AI processing)
            proxy_connect_timeout 90s;
            proxy_send_timeout 90s;
            proxy_read_timeout 90s;
            
            # Connection reuse
            proxy_set_header Connection "";
        }

        # Root endpoint - API Gateway info
        location / {
            default_type application/json;
            return 200 '{"service":"Flutter Finance API Gateway","status":"running","version":"1.0.0","endpoints":["/transactions","/chat","/health"],"documentation":"https://flutter.vault.io.vn"}';
        }

        # Block access to hidden files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
